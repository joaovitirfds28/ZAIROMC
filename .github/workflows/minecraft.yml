name: Minecraft Server

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Nome do servidor'
        required: true
        default: 'ZAIROMC'
      version:
        description: 'Versão do Minecraft'
        required: true
        default: '1.20.1'
      max_players:
        description: 'Máximo de jogadores'
        required: true
        default: '20'
      motd:
        description: 'Descrição do servidor'
        required: true
        default: 'Bem-vindo ao ZAIROMC!'
      server_type:
        description: 'Tipo (vanilla/paper/fabric)'
        required: true
        default: 'paper'
      restart_count:
        description: 'Número de reinícios (interno)'
        required: false
        default: '0'

jobs:
  minecraft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar dependências
        run: sudo apt-get install -y curl jq screen

      - name: Instalar ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok -y

      - name: Configurar ngrok
        run: ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      - name: Restaurar mundo salvo (se existir)
        run: |
          if [ -f "world-backup.tar.gz" ]; then
            echo "Restaurando mundo salvo..."
            tar -xzf world-backup.tar.gz -C server/ 2>/dev/null || true
          fi

      - name: Baixar servidor ${{ github.event.inputs.server_type }}
        run: |
          mkdir -p server && cd server
          TYPE="${{ github.event.inputs.server_type }}"
          VERSION="${{ github.event.inputs.version }}"

          if [ "$TYPE" = "paper" ]; then
            BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds" \
              | jq -r '.builds[-1].build')
            JAR="paper-${VERSION}-${BUILD}.jar"
            curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds/${BUILD}/downloads/${JAR}" \
              -o server.jar
          elif [ "$TYPE" = "fabric" ]; then
            curl -fsSL "https://meta.fabricmc.net/v2/versions/loader/${VERSION}" -o fabric_versions.json
            LOADER=$(cat fabric_versions.json | jq -r '.[0].loader.version')
            INSTALLER="1.0.1"
            curl -fsSL "https://meta.fabricmc.net/v2/versions/loader/${VERSION}/${LOADER}/${INSTALLER}/server/jar" \
              -o server.jar
          else
            MANIFEST=$(curl -s "https://launchermeta.mojang.com/mc/game/version_manifest.json")
            URL=$(echo "$MANIFEST" | jq -r --arg v "$VERSION" '.versions[] | select(.id==$v) | .url')
            SERVER_URL=$(curl -s "$URL" | jq -r '.downloads.server.url')
            curl -fsSL "$SERVER_URL" -o server.jar
          fi

      - name: Configurar servidor
        run: |
          cd server
          echo "eula=true" > eula.txt
          cat > server.properties << EOF
          server-name=${{ github.event.inputs.server_name }}
          motd=${{ github.event.inputs.motd }}
          max-players=${{ github.event.inputs.max_players }}
          online-mode=false
          difficulty=normal
          gamemode=survival
          view-distance=10
          EOF

      - name: Iniciar servidor em background
        run: |
          cd server
          screen -dmS mc java -Xms2G -Xmx3G -jar server.jar nogui
          echo "Aguardando servidor iniciar..."
          sleep 40

      - name: Iniciar ngrok e capturar endereço
        run: |
          ngrok tcp 25565 --log=stdout &
          sleep 8
          NGROK_INFO=$(curl -s http://localhost:4040/api/tunnels)
          ADDR=$(echo "$NGROK_INFO" | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          HOST=$(echo "$ADDR" | cut -d: -f1)
          PORT=$(echo "$ADDR" | cut -d: -f2)
          echo "SERVER_HOST=$HOST" >> $GITHUB_ENV
          echo "SERVER_PORT=$PORT" >> $GITHUB_ENV
          echo "::notice title=🎮 Servidor Online::IP: $HOST | Porta: $PORT"

          # Salvar endereço para consulta
          echo "{\"host\":\"$HOST\",\"port\":\"$PORT\",\"name\":\"${{ github.event.inputs.server_name }}\",\"version\":\"${{ github.event.inputs.version }}\",\"status\":\"online\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > server-address.json

      - name: Commit do endereço do servidor
        run: |
          git config user.name "ZAIROMC Bot"
          git config user.email "bot@zairomc.gg"
          git add server-address.json
          git commit -m "🟢 Servidor online: ${{ env.SERVER_HOST }}:${{ env.SERVER_PORT }}" || true
          git push || true

      - name: Manter servidor por 5h50min e depois reiniciar
        run: |
          echo "Servidor rodando. Reinicio automático em 5h50min..."
          sleep 21000

          # Salvar mundo antes de reiniciar
          cd server
          screen -S mc -X stuff "save-all\n"
          sleep 10
          screen -S mc -X stuff "stop\n"
          sleep 15

          # Fazer backup do mundo
          cd ..
          tar -czf world-backup.tar.gz server/world server/world_nether server/world_the_end 2>/dev/null || true

          # Commit do backup
          git config user.name "ZAIROMC Bot"
          git config user.email "bot@zairomc.gg"
          git add world-backup.tar.gz
          git commit -m "💾 Backup automático do mundo" || true
          git push || true

      - name: Auto-restart — disparar novo workflow
        if: always()
        run: |
          RESTART_COUNT=$(( ${{ github.event.inputs.restart_count }} + 1 ))
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/joaovitirfds28/ZAIROMC/actions/workflows/minecraft.yml/dispatches \
            -d "{
              \"ref\": \"main\",
              \"inputs\": {
                \"server_name\": \"${{ github.event.inputs.server_name }}\",
                \"version\": \"${{ github.event.inputs.version }}\",
                \"max_players\": \"${{ github.event.inputs.max_players }}\",
                \"motd\": \"${{ github.event.inputs.motd }}\",
                \"server_type\": \"${{ github.event.inputs.server_type }}\",
                \"restart_count\": \"$RESTART_COUNT\"
              }
            }"
          echo "♻️ Novo ciclo iniciado ($RESTART_COUNT)"
